<!DOCTYPE html>
<html>

<head>
    <link rel="stylesheet" href="popup.css" />
    <script src="popup.js" defer></script>
    <title>Simplify YouTube / Settings</title>
</head>

<body>
    <div class="main">
        <h1>YouTube Player / Left Controls</h1>
        <div id="container1" class="table"></div>
        <h1>YouTube Player / Center Controls</h1>
        <div id="container2" class="table"></div>
        <h1>YouTube Player / Right Controls</h1>
        <div id="container3" class="table"></div>
        <h1>Embedded Player</h1>
        <div id="container4" class="table"></div>
        <h1>Top bar</h1>
        <div id="container5" class="table"></div>
        <h1>Sidebar</h1>
        <div id="container6" class="table"></div>
        <div class="footer">
            <div id="reset_container">
                <input id="reset" type="reset" title="Press and hold the button for 1 second to reset." />
            </div>
            <div id="reset_progress"></div>
        </div>
    </div>
</body>

</html>
